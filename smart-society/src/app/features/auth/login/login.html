<div class="login-page">
  <div class="login-card">

    <div class="login-header">
      <div class="logo">🏢</div>
      <h1>Smart Society</h1>
      <p>Sign in to your account</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">

      <div class="alert-error" *ngIf="error">
        {{ error }}
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="you@example.com"
          [class.invalid]="email?.touched && email?.invalid"
        />
        <span class="error-msg" *ngIf="email?.touched && email?.errors?.['required']">
          Email is required
        </span>
        <span class="error-msg" *ngIf="email?.touched && email?.errors?.['email']">
          Enter a valid email
        </span>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="Your password"
            [class.invalid]="password?.touched && password?.invalid"
          />
          <button type="button" class="toggle-pw" (click)="togglePassword()">
            {{ showPassword ? 'Hide' : 'Show' }}
          </button>
        </div>
        <span class="error-msg" *ngIf="password?.touched && password?.invalid">
          Password is required
        </span>
      </div>

      <div class="forgot-link">
        <a routerLink="/auth/forgot-password">Forgot password?</a>
      </div>

      <button type="submit" class="btn-login" [disabled]="loading">
        <span *ngIf="!loading">Sign In</span>
        <span *ngIf="loading">Signing in...</span>
      </button>

    </form>
  </div>
</div>
